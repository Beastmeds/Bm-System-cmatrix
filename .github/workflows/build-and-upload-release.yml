name: Build and upload release assets
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'

jobs:
  build_and_upload:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install prerequisites (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libncurses-dev

      - name: Install prerequisites (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew update
          brew install cmake ncurses || true

      - name: Install prerequisites (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          choco install -y cmake

      - name: Configure & build
        run: |
          cmake -S . -B build
          if [ "${{ runner.os }}" = "Windows" ]; then
            cmake --build build --config Release
          else
            cmake --build build -- -j 2
          fi

      - name: Determine asset name
        id: asset
        run: |
          OS=$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')
          ARCH=$(uname -m || echo x86_64)
          case "$OS" in
            windows*) ASSET_NAME="cmatrix-windows-${ARCH}.exe" ; ASSET_PATH="build/Release/cmatrix.exe" ;;
            macos*) ASSET_NAME="cmatrix-macos-${ARCH}" ; ASSET_PATH="build/cmatrix" ;;
            linux*) ASSET_NAME="cmatrix-linux-${ARCH}" ; ASSET_PATH="build/cmatrix" ;;
            *) ASSET_NAME="cmatrix-${OS}-${ARCH}" ; ASSET_PATH="build/cmatrix" ;;
          esac
          echo "asset_name=$ASSET_NAME" >> $GITHUB_OUTPUT
          echo "asset_path=$ASSET_PATH" >> $GITHUB_OUTPUT

      - name: Upload build to release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.asset.outputs.asset_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
