name: Build and upload release assets

on:
  push:
    tags:
      - 'v*'

jobs:
  create_release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
    steps:
      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          body: |
            Automated release built by CI.

  build_and_upload:
    needs: create_release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install prerequisites (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libncurses-dev

      - name: Install prerequisites (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew update
          brew install cmake ncurses || true

      - name: Install prerequisites (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          choco install -y cmake

      - name: Configure & build
        run: |
          cmake -S . -B build
          if [ "${{ runner.os }}" = "Windows" ]; then
            cmake --build build --config Release
          else
            cmake --build build -- -j 2
          fi

      - name: Determine asset name
        id: asset
        run: |
          OS=$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')
          ARCH=$(uname -m || echo x86_64)
          case "$OS" in
            windows*) ASSET_NAME="cmatrix-windows-${ARCH}.exe" ; ASSET_PATH="build/Release/cmatrix.exe" ;;
            macos*) ASSET_NAME="cmatrix-macos-${ARCH}" ; ASSET_PATH="build/cmatrix" ;;
            linux*) ASSET_NAME="cmatrix-linux-${ARCH}" ; ASSET_PATH="build/cmatrix" ;;
            *) ASSET_NAME="cmatrix-${OS}-${ARCH}" ; ASSET_PATH="build/cmatrix" ;;
          esac
          echo "asset_name=$ASSET_NAME" >> $GITHUB_OUTPUT
          echo "asset_path=$ASSET_PATH" >> $GITHUB_OUTPUT

      - name: Upload build to release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ steps.asset.outputs.asset_path }}
          asset_name: ${{ steps.asset.outputs.asset_name }}
          asset_content_type: application/octet-stream
